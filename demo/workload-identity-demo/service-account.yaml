# ${WORKLOAD_IDENTITY_CLIENT_ID} is filled by `envsubst` — export it first:
#   export WORKLOAD_IDENTITY_CLIENT_ID="$(terraform -chdir=terraform output -raw workload_identity_client_id)"
#
# The federated credential (modules/workload-identity) trusts tokens whose subject is
# exactly "system:serviceaccount:workload-demo:workload-demo-sa" — name/namespace here
# must match var.workload_namespace / var.workload_service_account_name exactly.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-demo-sa
  namespace: workload-demo
  annotations:
    azure.workload.identity/client-id: "${WORKLOAD_IDENTITY_CLIENT_ID}"
  labels:
    azure.workload.identity/use: "true"
