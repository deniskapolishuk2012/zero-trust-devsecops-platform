# Incident Response Demo trigger (Sprint 7) — apply this and watch it get rejected:
#
#   kubectl apply -f demo/privileged-pod-attempt.yaml
#
# Expected outcome: the API server returns "admission webhook ... denied the
# request" — Kyverno's baseline Pod Security "restricted" policy (modules/kyverno)
# blocks privileged containers before the pod is ever scheduled. That denial lands
# in kube-audit-admin -> Log Analytics -> the "ZTP-Privileged-Container-Blocked"
# Sentinel rule, which raises an incident mapped to MITRE ATT&CK T1610 / T1611.
# See docs/INCIDENT_RESPONSE_DEMO.md for the full walkthrough.
apiVersion: v1
kind: Pod
metadata:
  name: attacker-privileged-probe
  namespace: workload-demo
  labels:
    app: attacker-privileged-probe
spec:
  containers:
    - name: probe
      image: busybox:1.36
      command: ["sleep", "3600"]
      securityContext:
        privileged: true
        runAsUser: 0
        capabilities:
          add: ["SYS_ADMIN"]
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
  hostPID: true
  hostNetwork: true
