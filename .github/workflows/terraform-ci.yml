name: Terraform CI

on:
  pull_request:
    paths:
      - "terraform/**"
      - "modules/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - "modules/**"

permissions:
  contents: read

jobs:
  fmt-validate:
    name: fmt / validate / tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.8.5"

      - name: terraform fmt (check only — never auto-fix in CI)
        run: terraform fmt -check -recursive

      - name: terraform init (no backend — validate doesn't need state)
        working-directory: terraform
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: terraform
        run: terraform validate

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive

  checkov:
    name: Checkov (IaC misconfiguration scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          # Soft-fail for now — flip to default (hard fail) once the baseline is triaged
          soft_fail: true

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
